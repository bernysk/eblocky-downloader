name: Build and Release Windows EXE

# This workflow triggers automatically when you push a tag like "v1.0.0"
# It can also be run manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    
    # CRITICAL: This grants the workflow permission to create a Release in your repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyinstaller

      - name: Build EXE with PyInstaller
        run: >
          pyinstaller --onefile --console 
          --name eblocky-exporter 
          eblocky_export.py

      # This step only runs if a tag triggered the workflow.
      # It creates the release and uploads the .exe file.
      - name: Create GitHub Release and Upload EXE
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/eblocky-exporter.exe
          generate_release_notes: true
          draft: false
          prerelease: false
